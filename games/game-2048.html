<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048 - Arcade Hub</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .game-2048-container {
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
    }
    .grid-2048 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 10px;
      background: var(--color-bg-3);
      padding: 10px;
      border-radius: 12px;
      aspect-ratio: 1 / 1;
      border: 2px solid var(--card-border);
      position: relative;
    }
    .grid-cell {
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: bold;
      color: #fff;
      transition: all 0.15s ease-in-out;
    }
    
    /* Tile Colors */
    .tile-2 { background: #eee4da; color: #776e65; }
    .tile-4 { background: #ede0c8; color: #776e65; }
    .tile-8 { background: #f2b179; color: #f9f6f2; }
    .tile-16 { background: #f59563; color: #f9f6f2; }
    .tile-32 { background: #f67c5f; color: #f9f6f2; }
    .tile-64 { background: #f65e3b; color: #f9f6f2; }
    .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 1.5rem; }
    .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 1.5rem; }
    .tile-512 { background: #edc850; color: #f9f6f2; font-size: 1.5rem; }
    .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 1.2rem; }
    .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 1.2rem; box-shadow: 0 0 30px #edc22e; }
    
    @media (max-width: 480px) {
      .grid-cell { font-size: 1.5rem; }
      .tile-128, .tile-256, .tile-512 { font-size: 1.2rem; }
      .tile-1024, .tile-2048 { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1 class="title">2048</h1>
    <a href="../index.html" class="btn" style="font-size: 0.8rem;">KEMBALI KE LOBBY</a>
  </header>
  <main class="game-container">
    <div style="display: flex; justify-content: space-between; align-items: center; max-width: 400px; margin: 0 auto 1.5rem;">
      <div style="text-align: left;">
        <div style="font-family: var(--font-title); font-size: 0.8rem; color: var(--color-text-dim);">Skor</div>
        <div id="score" style="font-size: 2rem; font-weight: bold; color: var(--color-accent);">0</div>
      </div>
      <div style="text-align: right;">
        <div style="font-family: var(--font-title); font-size: 0.8rem; color: var(--color-text-dim);">Terbaik</div>
        <div id="best-score" style="font-size: 2rem; font-weight: bold;">0</div>
      </div>
    </div>
    
    <p class="mb-2" style="font-size: 0.9rem; color: var(--color-text-dim);">Gunakan tombol panah (⬅️⬆️⬇️➡️) untuk menggabungkan angka.</p>

    <div class="game-2048-container">
      <div class="grid-2048" id="grid">
        <!-- Cells generated by JS -->
      </div>
    </div>

    <button class="btn mt-2" id="restart-btn" style="padding: 0.8rem 2rem;">Mulai Baru</button>
  </main>
  <script src="../script.js"></script>
  <script src="game-2048.js"></script>
</body>
</html>
