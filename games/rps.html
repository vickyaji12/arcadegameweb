<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Batu Gunting Kertas - Arcade Hub</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .choice-btn {
      font-size: 3rem;
      background: rgba(255,255,255,0.05);
      border: 2px solid var(--color-border);
      border-radius: 50%;
      width: 100px;
      height: 100px;
      cursor: pointer;
      transition: all 0.3s;
      margin: 0 10px;
    }
    .choice-btn:hover {
      transform: translateY(-10px) scale(1.1);
      box-shadow: 0 10px 25px rgba(0, 242, 254, 0.4);
      background: rgba(0, 242, 254, 0.2);
      border-color: var(--color-accent);
    }
    .score-board {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 2rem;
      font-family: var(--font-title);
      font-size: 0.8rem;
    }
    .score-box {
      background: rgba(0,0,0,0.3);
      padding: 1rem;
      border-radius: 12px;
      min-width: 100px;
    }
    .score-box span {
      display: block;
      font-size: 1.5rem;
      margin-top: 0.5rem;
      color: var(--color-accent);
    }
  </style>
</head>
<body>
  <header class="header">
    <h1 class="title">Batu Gunting</h1>
    <a href="../index.html" class="btn" style="font-size: 0.8rem;">KEMBALI KE LOBBY</a>
  </header>
  <main class="game-container">
    <div id="arena" class="mb-2" style="font-size: 4rem; display: flex; justify-content: space-around; align-items: center; min-height: 120px;">
      <div id="player-hand">❓</div>
      <div style="font-size: 2rem; color: var(--color-text-dim);">VS</div>
      <div id="computer-hand">❓</div>
    </div>
    
    <p id="result-msg" style="font-size: 1.5rem; font-weight: bold; min-height: 2rem; margin-bottom: 2rem;">Pilih senjatamu!</p>

    <div class="choices">
      <button class="choice-btn" data-choice="rock">🪨</button>
      <button class="choice-btn" data-choice="paper">📄</button>
      <button class="choice-btn" data-choice="scissors">✂️</button>
    </div>

    <div class="score-board">
      <div class="score-box">Menang <span id="score-win">0</span></div>
      <div class="score-box">Kalah <span id="score-lose">0</span></div>
      <div class="score-box">Seri <span id="score-tie">0</span></div>
    </div>
    
    <button class="btn mt-2" id="reset-stats" style="background: rgba(255,255,255,0.1); color: #fff; box-shadow: none;">Reset Skor</button>
  </main>
  <script src="../script.js"></script>
  <script src="rps.js"></script>
</body>
</html>
