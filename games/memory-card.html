<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Card - Arcade Hub</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .memory-board {
      display: grid;
      grid-template-columns: repeat(4, 80px);
      gap: 15px;
      justify-content: center;
      margin: 2rem auto;
      perspective: 1000px;
    }
    .memory-card {
      width: 80px;
      height: 80px;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.5s;
      cursor: pointer;
    }
    .memory-card.flip {
      transform: rotateY(180deg);
    }
    .memory-card .front, .memory-card .back {
      width: 100%;
      height: 100%;
      position: absolute;
      border-radius: 12px;
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }
    .memory-card .front {
      background: var(--color-bg-2);
      border: 2px solid var(--color-accent);
      transform: rotateY(180deg);
    }
    .memory-card .back {
      background: linear-gradient(135deg, var(--color-bg-3), #1a1a2e);
      border: 2px solid rgba(255,255,255,0.1);
    }
    .memory-card .back::after {
      content: '❓';
      font-size: 1.5rem;
      opacity: 0.5;
    }
    @media (max-width: 480px) {
      .memory-board {
        grid-template-columns: repeat(4, 60px);
        gap: 10px;
      }
      .memory-card { width: 60px; height: 60px; }
      .memory-card .front { font-size: 1.8rem; }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1 class="title">Memory Card</h1>
    <a href="../index.html" class="btn" style="font-size: 0.8rem;">KEMBALI KE LOBBY</a>
  </header>
  <main class="game-container">
    <div style="display: flex; justify-content: space-around; font-size: 1.2rem; font-family: var(--font-title); margin-bottom: 1rem;">
      <p>Gerakan: <span id="moves" style="color: var(--color-accent);">0</span></p>
      <p>Waktu: <span id="time" style="color: var(--color-accent);">0s</span></p>
    </div>
    
    <div class="memory-board" id="memory-board">
      <!-- Cards generated by JS -->
    </div>

    <button class="btn mt-2" id="restart-btn" style="padding: 0.5rem 1.5rem;">Ulangi Game</button>
  </main>
  <script src="../script.js"></script>
  <script src="memory-card.js"></script>
</body>
</html>
