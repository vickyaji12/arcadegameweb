<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Card — Arcade Hub</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../style.css">
  <style>
    .mem-stats {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .memory-board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      justify-content: center;
      margin: 0 auto 1.5rem;
      max-width: 380px;
      perspective: 1000px;
    }
    .memory-card {
      aspect-ratio: 1;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.45s var(--ease-smooth);
      cursor: pointer;
      border-radius: var(--radius-sm);
    }
    .memory-card.flip { transform: rotateY(180deg); }
    .memory-card.matched { cursor: default; }
    .memory-card.matched .front {
      border-color: var(--green);
      box-shadow: 0 0 18px rgba(34,211,165,0.4);
    }

    .memory-card .front,
    .memory-card .back {
      width: 100%; height: 100%;
      position: absolute;
      border-radius: var(--radius-sm);
      backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
    }
    .memory-card .front {
      background: var(--bg-layer2);
      border: 2px solid var(--card-border-hover);
      transform: rotateY(180deg);
    }
    .memory-card .back {
      background: linear-gradient(135deg, var(--bg-layer2), var(--bg-layer3));
      border: 2px solid var(--card-border);
      color: var(--color-text-muted);
      font-size: 1.4rem;
    }
    .memory-card .back::after { content: '❓'; opacity: 0.5; }
    .memory-card:hover:not(.flip):not(.matched) .back {
      border-color: var(--card-border-hover);
      background: rgba(0,229,255,0.05);
    }

    @media (max-width: 420px) {
      .memory-board { gap: 8px; max-width: 300px; }
      .memory-card .front { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="orb orb-1" aria-hidden="true"></div>
  <div class="orb orb-2" aria-hidden="true"></div>

  <header class="game-header">
    <a href="../index.html" class="back-btn">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Lobby
    </a>
    <span class="game-header-title">Memory Card</span>
    <span class="game-header-icon">🎴</span>
  </header>

  <main class="game-container">
    <div class="mem-stats">
      <div class="stat-chip">
        <div class="stat-chip-label">Gerakan</div>
        <div class="stat-chip-value" id="moves">0</div>
      </div>
      <div class="stat-chip">
        <div class="stat-chip-label">Waktu</div>
        <div class="stat-chip-value" id="time">0s</div>
      </div>
      <div class="stat-chip">
        <div class="stat-chip-label">Pasangan</div>
        <div class="stat-chip-value" id="pairs">0/8</div>
      </div>
    </div>

    <div class="memory-board" id="memory-board" aria-label="Papan Memory Card">
      <!-- Cards generated by JS -->
    </div>

    <button class="btn btn-ghost btn-sm" id="restart-btn">🔄 Ulangi Game</button>
  </main>

  <div id="toast-container"></div>
  <script src="../script.js"></script>
  <script src="memory-card.js"></script>
</body>
</html>
