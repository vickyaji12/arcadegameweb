<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whack-a-Mole — Arcade Hub</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../style.css">
  <style>
    .wam-stats {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 1.75rem;
      flex-wrap: wrap;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      max-width: 340px;
      margin: 0 auto 2rem;
    }
    .hole {
      aspect-ratio: 1;
      background: radial-gradient(ellipse at 50% 80%, var(--bg-layer3), var(--bg-base));
      border: 3px solid var(--bg-layer3);
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 8px 20px rgba(0,0,0,0.7),
                  0 4px 12px rgba(0,0,0,0.4);
      cursor: crosshair;
    }
    .hole::before {
      content:'';
      position:absolute;
      top: 55%; left: 0; right: 0; bottom: 0;
      background: var(--bg-base);
      border-radius: 0 0 50% 50%;
      z-index: 2;
    }
    .mole {
      width: 85%; height: 85%;
      position: absolute;
      top: 110%;
      left: 50%; transform: translateX(-50%);
      transition: top 0.18s var(--ease-bounce);
      font-size: 3rem;
      display: flex; align-items: center; justify-content: center;
      z-index: 1;
      user-select: none;
      filter: drop-shadow(0 -4px 8px rgba(0,0,0,0.5));
    }
    .hole.up .mole { top: 5%; }
    .mole.bonked { filter: brightness(1.5) drop-shadow(0 0 12px rgba(255,200,0,0.8)); }

    .timer-bar-wrap {
      background: var(--bg-layer2);
      border-radius: var(--radius-pill);
      height: 6px;
      margin: 0 auto 1.5rem;
      max-width: 340px;
      overflow: hidden;
      border: 1px solid var(--card-border);
    }
    .timer-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--cyan), var(--purple));
      border-radius: var(--radius-pill);
      transition: width 0.5s linear;
      width: 100%;
    }

    @media (max-width: 420px) {
      .grid { gap: 10px; max-width: 260px; }
      .mole { font-size: 2.2rem; }
    }
  </style>
</head>
<body>
  <div class="orb orb-1" aria-hidden="true"></div>
  <div class="orb orb-2" aria-hidden="true"></div>

  <header class="game-header">
    <a href="../index.html" class="back-btn">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Lobby
    </a>
    <span class="game-header-title">Whack-a-Mole</span>
    <span class="game-header-icon">🔨</span>
  </header>

  <main class="game-container">
    <div class="wam-stats">
      <div class="stat-chip">
        <div class="stat-chip-label">Skor</div>
        <div class="stat-chip-value" id="score">0</div>
      </div>
      <div class="stat-chip">
        <div class="stat-chip-label">Waktu</div>
        <div class="stat-chip-value" id="time">30</div>
      </div>
      <div class="stat-chip">
        <div class="stat-chip-label">Rekor</div>
        <div class="stat-chip-value" id="best-score" style="color:var(--yellow)">—</div>
      </div>
    </div>

    <div class="timer-bar-wrap">
      <div class="timer-bar" id="timer-bar"></div>
    </div>

    <div class="grid" id="grid">
      <div class="hole"><div class="mole">🐹</div></div>
      <div class="hole"><div class="mole">🐹</div></div>
      <div class="hole"><div class="mole">🐹</div></div>
      <div class="hole"><div class="mole">🐹</div></div>
      <div class="hole"><div class="mole">🐹</div></div>
      <div class="hole"><div class="mole">🐹</div></div>
      <div class="hole"><div class="mole">🐹</div></div>
      <div class="hole"><div class="mole">🐹</div></div>
      <div class="hole"><div class="mole">🐹</div></div>
    </div>

    <button class="btn" id="start-btn">🔨 MULAI GAME</button>
  </main>

  <div id="toast-container"></div>
  <script src="../script.js"></script>
  <script src="whack-a-mole.js"></script>
  <script>
    const best = getHighScore('whack_a_mole');
    if (best > 0) document.getElementById('best-score').textContent = best;
  </script>
</body>
</html>
