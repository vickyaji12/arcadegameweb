<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Whack-a-Mole - Arcade Hub</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .game-stats {
      display: flex;
      justify-content: space-around;
      font-family: var(--font-title);
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 15px;
      justify-content: center;
      margin: 0 auto;
    }
    .hole {
      background: var(--color-bg-2);
      border: 4px solid var(--color-bg-1);
      border-radius: 50%;
      position: relative;
      overflow: hidden;
      box-shadow: inset 0 10px 20px rgba(0,0,0,0.8);
    }
    .mole {
      width: 100%;
      height: 100%;
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="75" x="15" font-size="70">🐹</text></svg>') no-repeat center center;
      background-size: cover;
      position: absolute;
      top: 100%;
      transition: top 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: crosshair;
    }
    .hole.up .mole {
      top: 0;
    }
    .mole.bonked {
      background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="75" x="15" font-size="70">💥</text></svg>') no-repeat center center;
      top: 0;
    }
    @media (max-width: 480px) {
      .grid { grid-template-columns: repeat(3, 80px); grid-template-rows: repeat(3, 80px); }
    }
  </style>
</head>
<body>
  <header class="header">
    <h1 class="title">Whack-a-Mole</h1>
    <a href="../index.html" class="btn" style="font-size: 0.8rem;">KEMBALI KE LOBBY</a>
  </header>
  <main class="game-container">
    <div class="game-stats">
      <p>Skor: <span id="score" style="color: var(--color-accent);">0</span></p>
      <p>Waktu: <span id="time">30</span>s</p>
    </div>
    
    <div class="grid">
      <div class="hole"><div class="mole"></div></div>
      <div class="hole"><div class="mole"></div></div>
      <div class="hole"><div class="mole"></div></div>
      <div class="hole"><div class="mole"></div></div>
      <div class="hole"><div class="mole"></div></div>
      <div class="hole"><div class="mole"></div></div>
      <div class="hole"><div class="mole"></div></div>
      <div class="hole"><div class="mole"></div></div>
      <div class="hole"><div class="mole"></div></div>
    </div>

    <button class="btn mt-2" id="start-btn" style="padding: 1rem 3rem;">MULAI GAME</button>
  </main>
  <script src="../script.js"></script>
  <script src="whack-a-mole.js"></script>
</body>
</html>
