<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hangman — Arcade Hub</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../style.css">
  <style>
    .drawing {
      font-size: 1.4rem;
      font-family: monospace;
      white-space: pre;
      margin: 0 auto 1.5rem;
      line-height: 1.2;
      color: var(--cyan);
      background: rgba(255, 255, 255, 0.02);
      padding: 1.25rem 2rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--card-border);
      width: fit-content;
      text-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
      letter-spacing: 0;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.3);
    }
    
    .status-text {
      font-size: 1.1rem;
      font-family: var(--font-body);
      font-weight: 600;
      color: var(--color-text-dim);
      margin-bottom: 1.5rem;
      text-align: center;
      min-height: 1.7rem;
    }

    .word-display {
      font-size: clamp(2rem, 7vw, 2.8rem);
      letter-spacing: 0.4rem;
      margin: 1.5rem 0 2rem;
      font-family: monospace;
      font-weight: 700;
      color: var(--cyan);
      text-shadow: 0 0 15px rgba(0, 229, 255, 0.4);
      text-align: center;
      word-break: break-all;
    }
    
    .keyboard {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      max-width: 480px;
      margin: 0 auto;
    }
    
    .key {
      background: var(--bg-layer2);
      border: 1px solid var(--card-border);
      color: var(--color-text);
      width: 40px;
      height: 40px;
      font-size: 0.95rem;
      font-family: var(--font-title);
      font-weight: 700;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s var(--ease-smooth);
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }
    
    .key:hover:not(:disabled) {
      border-color: var(--card-border-hover);
      background: rgba(0, 229, 255, 0.08);
      color: var(--cyan);
      transform: translateY(-2px);
    }
    
    .key:disabled {
      opacity: 0.25;
      cursor: not-allowed;
      border-color: transparent;
      background: rgba(255,255,255,0.02);
    }

    @media (max-width: 480px) {
      .drawing { font-size: 1.1rem; padding: 1rem 1.5rem; }
      .key { width: 34px; height: 34px; font-size: 0.85rem; }
      .keyboard { gap: 6px; }
    }
  </style>
</head>
<body>
  <div class="orb orb-1" aria-hidden="true"></div>
  <div class="orb orb-2" aria-hidden="true"></div>

  <header class="game-header">
    <a href="../index.html" class="back-btn">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Lobby
    </a>
    <span class="game-header-title">Hangman</span>
    <span class="game-header-icon">🪓</span>
  </header>

  <main class="game-container" style="max-width: 550px;">
    <div class="drawing" id="drawing"></div>
    
    <div class="status-text" id="status-text">Tebak kata rahasia!</div>
    
    <div class="word-display" id="word-display">_ _ _ _ _</div>
    
    <div class="keyboard" id="keyboard">
      <!-- Keys generated by JS -->
    </div>
    
    <button class="btn btn-ghost btn-sm mt-2" id="restart-btn" style="display:none;">🔄 Main Lagi</button>
  </main>

  <div id="toast-container"></div>
  <script src="../script.js"></script>
  <script src="hangman.js"></script>
</body>
</html>
