<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hangman - Arcade Hub</title>
  <link rel="stylesheet" href="../style.css">
  <style>
    .word-display {
      font-size: 3rem;
      letter-spacing: 0.5rem;
      margin: 2rem 0;
      font-family: monospace;
      color: var(--color-accent);
      text-shadow: 0 0 10px rgba(0, 242, 254, 0.4);
    }
    .keyboard {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      max-width: 600px;
      margin: 0 auto;
    }
    .key {
      background: rgba(255,255,255,0.1);
      border: 1px solid var(--card-border);
      color: white;
      padding: 10px 15px;
      font-size: 1.2rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .key:hover:not(:disabled) {
      background: var(--color-accent);
      color: black;
      transform: translateY(-2px);
    }
    .key:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .drawing {
      font-size: 6rem;
      font-family: monospace;
      white-space: pre;
      margin-bottom: 1rem;
      line-height: 1.2;
    }
    .status-text {
      font-size: 1.2rem;
      margin-bottom: 1rem;
      min-height: 1.5rem;
    }
  </style>
</head>
<body>
  <header class="header">
    <h1 class="title">Hangman</h1>
    <a href="../index.html" class="btn" style="font-size: 0.8rem;">KEMBALI KE LOBBY</a>
  </header>
  <main class="game-container">
    <div class="drawing" id="drawing">
    </div>
    
    <div class="status-text" id="status-text">Tebak kata rahasia!</div>
    
    <div class="word-display" id="word-display">_ _ _ _ _</div>
    
    <div class="keyboard" id="keyboard">
      <!-- Keys generated by JS -->
    </div>
    
    <button class="btn mt-2" id="restart-btn" style="display:none; padding: 0.8rem 2rem;">Main Lagi</button>
  </main>
  <script src="../script.js"></script>
  <script src="hangman.js"></script>
</body>
</html>
