<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Trivia — Arcade Hub</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../style.css">
  <style>
    .quiz-card {
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 2.25rem 2rem;
      text-align: left;
      backdrop-filter: blur(12px);
      box-shadow: var(--shadow-card);
    }
    .question-text {
      font-size: clamp(1.1rem, 3.5vw, 1.4rem);
      margin-bottom: 2rem;
      font-weight: 700;
      line-height: 1.4;
      color: var(--color-text);
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }
    .option-btn {
      background: var(--bg-layer2);
      border: 1px solid var(--card-border);
      color: var(--color-text);
      padding: 1rem 1.25rem;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-family: var(--font-body);
      font-weight: 500;
      text-align: left;
      cursor: pointer;
      transition: all 0.2s var(--ease-smooth);
      outline: none;
    }
    .option-btn:hover:not(:disabled) {
      border-color: var(--card-border-hover);
      background: rgba(0, 229, 255, 0.06);
      transform: translateX(6px);
    }
    .option-btn.correct {
      background: rgba(34, 211, 165, 0.15) !important;
      border-color: var(--green) !important;
      color: var(--green) !important;
      font-weight: 600;
      box-shadow: 0 0 15px rgba(34, 211, 165, 0.25);
    }
    .option-btn.wrong {
      background: rgba(244, 63, 94, 0.15) !important;
      border-color: var(--red) !important;
      color: var(--red) !important;
      font-weight: 600;
      box-shadow: 0 0 15px rgba(244, 63, 94, 0.25);
    }
    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      font-family: var(--font-title);
      font-size: 0.75rem;
      letter-spacing: 1px;
      color: var(--cyan);
    }
  </style>
</head>
<body>
  <div class="orb orb-1" aria-hidden="true"></div>
  <div class="orb orb-2" aria-hidden="true"></div>

  <header class="game-header">
    <a href="../index.html" class="back-btn">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Lobby
    </a>
    <span class="game-header-title">Quiz Trivia</span>
    <span class="game-header-icon">🧠</span>
  </header>

  <main class="game-container" style="max-width: 600px;">
    
    <div id="quiz-setup" class="text-center">
      <p class="subtitle mb-2">Jawab pertanyaan-pertanyaan pengetahuan umum dengan cepat dan tepat. Soal akan dimuat dari database.</p>
      <button class="btn" id="start-btn" style="padding: 0.9rem 2.5rem;">MULAI KUIS</button>
      <p id="error-msg" class="text-accent mt-2" style="display: none; color: var(--red) !important;"></p>
    </div>

    <div id="quiz-active" class="quiz-card" style="display: none;">
      <div class="progress-bar-wrap">
        <div id="progress-fill" class="progress-bar"></div>
      </div>
      <div class="quiz-header">
        <span id="q-counter">Soal 1 / 5</span>
        <span id="q-score" style="color: var(--purple)">Skor: 0</span>
      </div>
      <div class="question-text" id="question">Pertanyaan dimuat...</div>
      <div class="options" id="options">
        <!-- Buttons injected by JS -->
      </div>
      <button class="btn mt-2" id="next-btn" style="display:none; width: 100%;">Soal Selanjutnya ➡️</button>
    </div>

  </main>

  <div id="toast-container"></div>
  <script src="../script.js"></script>
  <script src="quiz.js"></script>
</body>
</html>
