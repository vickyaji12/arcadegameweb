<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe — Arcade Hub</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../style.css">
  <style>
    .ttt-controls {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .mode-select {
      background: var(--bg-layer2);
      color: var(--color-text);
      border: 1px solid var(--card-border);
      padding: 0.55rem 1rem;
      border-radius: var(--radius-pill);
      font-family: var(--font-body);
      font-size: 0.85rem;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }
    .mode-select:focus { border-color: var(--card-border-hover); }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 0 auto;
      max-width: 320px;
      background: rgba(255,255,255,0.04);
      padding: 14px;
      border-radius: var(--radius);
      border: 1px solid var(--card-border);
    }
    .cell {
      aspect-ratio: 1;
      background: var(--bg-layer2);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-sm);
      font-size: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s var(--ease-smooth);
      user-select: none;
    }
    .cell:hover:not(.taken) {
      background: rgba(0,229,255,0.08);
      border-color: var(--card-border-hover);
    }
    .cell.taken { cursor: default; }
    .cell.x { color: var(--cyan);   text-shadow: 0 0 15px rgba(0,229,255,0.5); }
    .cell.o { color: var(--pink);   text-shadow: 0 0 15px rgba(236,72,153,0.5); }
    .cell.win-cell {
      background: rgba(0,229,255,0.12);
      border-color: var(--cyan);
      animation: winPulse 0.6s ease;
    }
    @keyframes winPulse {
      0%,100%{transform:scale(1)} 50%{transform:scale(1.1)}
    }
    .cell.pop { animation: cellPop 0.2s var(--ease-bounce); }
    @keyframes cellPop {
      0%{transform:scale(0.5)} 100%{transform:scale(1)}
    }

    #status-msg {
      font-size: 1.25rem;
      font-weight: 700;
      margin-top: 1.25rem;
      min-height: 2rem;
      font-family: var(--font-title);
      font-size: 0.85rem;
      letter-spacing: 1px;
    }

    .score-row {
      display: flex;
      justify-content: center;
      gap: 0.75rem;
      margin-top: 1.25rem;
      flex-wrap: wrap;
    }
    .score-chip {
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-sm);
      padding: 0.5rem 1.1rem;
      font-family: var(--font-title);
      font-size: 0.6rem;
      text-align: center;
      letter-spacing: 1px;
      color: var(--color-text-muted);
    }
    .score-chip span { display:block; font-size:1.4rem; font-weight:700; margin-top:2px; }
    .score-chip.x-score span { color: var(--cyan); }
    .score-chip.o-score span { color: var(--pink); }
    .score-chip.draw-score span { color: var(--yellow); }
  </style>
</head>
<body>
  <div class="orb orb-1" aria-hidden="true"></div>
  <div class="orb orb-2" aria-hidden="true"></div>

  <header class="game-header">
    <a href="../index.html" class="back-btn">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Lobby
    </a>
    <span class="game-header-title">Tic-Tac-Toe</span>
    <span class="game-header-icon">❌</span>
  </header>

  <main class="game-container">
    <div class="ttt-controls">
      <select class="mode-select" id="mode-select" aria-label="Pilih mode permainan">
        <option value="2p">👥 2 Pemain (Lokal)</option>
        <option value="ai-easy">🤖 AI Mudah</option>
        <option value="ai-hard">🧠 AI Sulit (Minimax)</option>
      </select>
      <button class="btn btn-ghost btn-sm" id="restart-btn">🔄 Ulangi</button>
    </div>

    <div class="board" id="board" role="grid" aria-label="Papan Tic-Tac-Toe">
      <div class="cell" data-index="0" role="gridcell" tabindex="0"></div>
      <div class="cell" data-index="1" role="gridcell" tabindex="0"></div>
      <div class="cell" data-index="2" role="gridcell" tabindex="0"></div>
      <div class="cell" data-index="3" role="gridcell" tabindex="0"></div>
      <div class="cell" data-index="4" role="gridcell" tabindex="0"></div>
      <div class="cell" data-index="5" role="gridcell" tabindex="0"></div>
      <div class="cell" data-index="6" role="gridcell" tabindex="0"></div>
      <div class="cell" data-index="7" role="gridcell" tabindex="0"></div>
      <div class="cell" data-index="8" role="gridcell" tabindex="0"></div>
    </div>

    <div id="status-msg">GILIRAN X</div>

    <div class="score-row">
      <div class="score-chip x-score">X MENANG<span id="score-x">0</span></div>
      <div class="score-chip draw-score">SERI<span id="score-draw">0</span></div>
      <div class="score-chip o-score">O MENANG<span id="score-o">0</span></div>
    </div>
  </main>

  <div id="toast-container"></div>
  <script src="../script.js"></script>
  <script src="tic-tac-toe.js"></script>
</body>
</html>
