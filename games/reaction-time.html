<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reaction Time Test — Arcade Hub</title>
  <link rel="icon" href="../favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="../style.css">
  <style>
    .reaction-area {
      width: 100%;
      max-width: 480px;
      height: 260px;
      border-radius: var(--radius-lg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.6rem;
      font-weight: 800;
      font-family: var(--font-title);
      color: white;
      text-align: center;
      transition: background 0.12s, box-shadow 0.3s;
      user-select: none;
      margin: 0 auto 2rem;
      border: 2px solid transparent;
      letter-spacing: 1px;
      gap: 0.5rem;
    }
    .reaction-hint {
      font-family: var(--font-body);
      font-size: 0.85rem;
      font-weight: 400;
      opacity: 0.75;
      letter-spacing: 0;
    }

    .state-idle {
      background: var(--bg-layer2);
      border-color: var(--card-border);
      color: var(--color-text-dim);
    }
    .state-waiting {
      background: linear-gradient(135deg, #dc2626, #f43f5e);
      box-shadow: 0 0 60px rgba(244,63,94,0.35);
    }
    .state-ready {
      background: linear-gradient(135deg, #059669, #22d3a5);
      box-shadow: 0 0 60px rgba(34,211,165,0.5);
      animation: readyPulse 0.3s ease;
    }
    .state-early {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      box-shadow: 0 0 60px rgba(124,58,237,0.35);
    }
    @keyframes readyPulse {
      0%{transform:scale(0.97)} 60%{transform:scale(1.02)} 100%{transform:scale(1)}
    }

    .reaction-stats {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .speed-indicator {
      margin-top: 1.25rem;
      font-size: 0.8rem;
      color: var(--color-text-muted);
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="orb orb-1" aria-hidden="true"></div>
  <div class="orb orb-2" aria-hidden="true"></div>

  <header class="game-header">
    <a href="../index.html" class="back-btn">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      Lobby
    </a>
    <span class="game-header-title">Reaction Test</span>
    <span class="game-header-icon">⚡</span>
  </header>

  <main class="game-container">
    <p class="subtitle mb-2">Klik area di bawah <strong style="color:var(--green)">secepat mungkin</strong> saat berubah menjadi <strong style="color:var(--green)">HIJAU</strong>!</p>

    <div id="reaction-area" class="reaction-area state-idle" role="button" tabindex="0" aria-label="Area reaksi, klik untuk mulai">
      Klik untuk Mulai
      <span class="reaction-hint">Area akan berubah merah, lalu hijau</span>
    </div>

    <div class="reaction-stats">
      <div class="stat-chip">
        <div class="stat-chip-label">Waktu Reaksi</div>
        <div class="stat-chip-value" id="time-display">— ms</div>
      </div>
      <div class="stat-chip">
        <div class="stat-chip-label">Rekor Terbaik</div>
        <div class="stat-chip-value" id="best-display" style="color:var(--yellow)">— ms</div>
      </div>
    </div>

    <p class="speed-indicator" id="speed-indicator"></p>
  </main>

  <div id="toast-container"></div>
  <script src="../script.js"></script>
  <script src="reaction-time.js"></script>
</body>
</html>
